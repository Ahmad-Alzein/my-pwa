<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Life OS — Ahmad</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-0: #07070B;
    --bg-1: #0A0A0F;
    --bg-2: #12121A;
    --bg-3: #1A1A26;
    --bg-4: #22222F;
    --border: rgba(255, 255, 255, 0.06);
    --border-2: rgba(255, 255, 255, 0.1);
    --border-hot: rgba(59, 130, 246, 0.4);
    --text-0: #F4F4F5;
    --text-1: #E4E4E7;
    --text-2: #A1A1AA;
    --text-3: #71717A;
    --text-4: #52525B;
    --text-5: #3F3F46;
    --blue: #3B82F6;
    --blue-dim: #1E3A8A;
    --cyan: #06B6D4;
    --cyan-dim: #164E63;
    --green: #22C55E;
    --amber: #F59E0B;
    --red: #EF4444;
    --purple: #A78BFA;

    --grid: 8px;
    --r-sm: 6px;
    --r: 10px;
    --r-lg: 14px;

    --ff-sans: "Geist", ui-sans-serif, system-ui, sans-serif;
    --ff-mono: "JetBrains Mono", ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    color: var(--text-1);
    font-family: var(--ff-sans);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Scanline / grid texture layered on bg */
  .cockpit-bg {
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background:
      radial-gradient(1200px 800px at 75% -10%, rgba(59,130,246,0.05), transparent 60%),
      radial-gradient(1000px 600px at 0% 110%, rgba(6,182,212,0.04), transparent 60%),
      linear-gradient(var(--bg-0), var(--bg-0));
  }
  .cockpit-bg::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
    mask: radial-gradient(ellipse at center, black 40%, transparent 90%);
  }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-4); border-radius: 5px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a4a; }

  button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; }
  input, textarea, select { font-family: inherit; color: inherit; background: none; border: 0; outline: 0; }

  .mono { font-family: var(--ff-mono); font-feature-settings: "zero", "ss01"; }

  /* Utility text sizes */
  .t-10 { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }
  .t-11 { font-size: 11px; letter-spacing: 0.05em; }
  .t-12 { font-size: 12px; }
  .t-13 { font-size: 13px; }
  .t-14 { font-size: 14px; }
  .t-18 { font-size: 18px; }
  .t-22 { font-size: 22px; }
  .t-28 { font-size: 28px; }
  .t-36 { font-size: 36px; }

  /* Card surface */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.015), transparent), var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--r);
    position: relative;
  }
  .card-tight { padding: 14px; }
  .card-pad { padding: 18px; }

  /* Section header */
  .sec-label {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-3); text-transform: uppercase;
    font-size: 10px; letter-spacing: 0.12em; font-weight: 500;
    font-family: var(--ff-mono);
  }
  .sec-label::before {
    content: ""; width: 4px; height: 4px; background: var(--cyan);
    border-radius: 50%; box-shadow: 0 0 6px var(--cyan);
  }

  /* HUD corner ticks */
  .hud { position: relative; }
  .hud::before, .hud::after {
    content: ""; position: absolute; width: 8px; height: 8px;
    border-color: rgba(59,130,246,0.5);
    pointer-events: none;
  }
  .hud::before { top: -1px; left: -1px; border-top: 1px solid; border-left: 1px solid; }
  .hud::after  { bottom: -1px; right: -1px; border-bottom: 1px solid; border-right: 1px solid; }

  /* Status dots */
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }
  .dot-todo    { background: var(--text-3); }
  .dot-doing   { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
  .dot-done    { background: var(--green); }
  .dot-blocked { background: var(--red); }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 8px; border-radius: 6px;
    font-family: var(--ff-mono); font-size: 11px;
    background: var(--bg-3); color: var(--text-2);
    border: 1px solid var(--border);
    line-height: 1.2;
  }
  .pill-p0 { color: #FCA5A5; background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); }
  .pill-p1 { color: #FDBA74; background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.2); }
  .pill-p2 { color: #93C5FD; background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.2); }
  .pill-p3 { color: var(--text-3); background: rgba(255,255,255,0.03); }
  .pill-doing   { color: #FCD34D; background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.25); }
  .pill-done    { color: #86EFAC; background: rgba(34,197,94,0.12); border-color: rgba(34,197,94,0.25); }
  .pill-todo    { color: var(--text-2); }
  .pill-blocked { color: #FCA5A5; background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.25); }
  .pill-cyan    { color: #67E8F9; background: rgba(6,182,212,0.1); border-color: rgba(6,182,212,0.25); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 6px;
    font-size: 12px; font-weight: 500;
    background: var(--bg-3); color: var(--text-1);
    border: 1px solid var(--border-2);
    transition: all 150ms ease;
  }
  .btn:hover { background: var(--bg-4); border-color: rgba(255,255,255,0.15); }
  .btn-primary {
    background: var(--blue); color: white;
    border-color: var(--blue);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.3), 0 4px 12px rgba(59,130,246,0.25);
  }
  .btn-primary:hover { background: #2563EB; }
  .btn-ghost { background: transparent; border-color: transparent; color: var(--text-2); }
  .btn-ghost:hover { background: var(--bg-3); color: var(--text-1); }
  .btn-sm { padding: 4px 8px; font-size: 11px; }
  .btn-icon { padding: 6px; width: 28px; height: 28px; justify-content: center; }

  /* Input */
  .input {
    background: var(--bg-1); border: 1px solid var(--border-2);
    border-radius: 6px; padding: 8px 10px; font-size: 13px;
    color: var(--text-1); transition: border-color 150ms;
    width: 100%;
  }
  .input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }

  /* Progress bar */
  .bar { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; position: relative; }
  .bar > i { display: block; height: 100%; background: var(--blue); border-radius: 2px; }

  /* Telemetry ticker */
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .live-dot { animation: pulse 1.8s ease-in-out infinite; }

  /* Slide-up modal */
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
    backdrop-filter: blur(6px); animation: fadeIn 150ms ease;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg-2); border: 1px solid var(--border-2);
    border-radius: 12px; padding: 20px; min-width: 440px; max-width: 540px;
    animation: slideUp 200ms cubic-bezier(0.16, 1, 0.3, 1);
    box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(59,130,246,0.1);
  }

  /* Routes */
  .fade-in { animation: fadeIn 200ms ease; }

  /* Sparklines/charts use SVG */

  /* Mobile */
  @media (max-width: 900px) {
    .desk-only { display: none; }
  }
</style>
</head>
