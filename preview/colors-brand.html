<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Brand & surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
  .swatch { aspect-ratio: 1.05; border-radius: 8px; border: 1px solid var(--border-soft); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: var(--shadow-sm); }
  .swatch .lbl { font-size: 11px; font-weight: 500; }
  .swatch .hex { font-family: var(--font-mono); font-size: 11px; opacity: 0.85; }
  .on-dark { color: #fff; }
  .on-light { color: var(--text-primary); }
</style></head>
<body>
  <div class="swatch on-dark"   style="background:#1E3A8A">       <div class="lbl">Accent</div>            <div class="hex">#1E3A8A</div></div>
  <div class="swatch on-dark"   style="background:#15296B">       <div class="lbl">Accent / hover</div>    <div class="hex">#15296B</div></div>
  <div class="swatch on-light"  style="background:#E0E7F4">       <div class="lbl">Accent / soft</div>     <div class="hex">#E0E7F4</div></div>
  <div class="swatch on-dark"   style="background:#0E1A2B">       <div class="lbl">Ink</div>               <div class="hex">#0E1A2B</div></div>
  <div class="swatch on-light"  style="background:#FFFFFF">       <div class="lbl">Raised</div>            <div class="hex">#FFFFFF</div></div>
  <div class="swatch on-light"  style="background:#FAFBFD">       <div class="lbl">Page</div>              <div class="hex">#FAFBFD</div></div>
  <div class="swatch on-light"  style="background:#F1F4F9">       <div class="lbl">Card</div>              <div class="hex">#F1F4F9</div></div>
  <div class="swatch on-light"  style="background:#E4EAF2">       <div class="lbl">Well</div>              <div class="hex">#E4EAF2</div></div>
  <div class="swatch on-light"  style="background:#C9D2DF">       <div class="lbl">Border</div>            <div class="hex">#C9D2DF</div></div>
  <div class="swatch on-light"  style="background:#8E97A8;color:#fff"><div class="lbl">Text muted</div>   <div class="hex">#8E97A8</div></div>
  <div class="swatch on-dark"   style="background:#4A5468">       <div class="lbl">Text secondary</div>    <div class="hex">#4A5468</div></div>
  <div class="swatch on-dark"   style="background:#0A1322">       <div class="lbl">Dark · page</div>       <div class="hex">#0A1322</div></div>
</body></html>
