<!doctype html>
<html><head><meta charset="utf-8"><title>Brand mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 32px; background: var(--bg-primary); display: flex; align-items: center; gap: 40px; min-height: 150px; }
  .specimen { display: flex; align-items: center; gap: 14px; }
  .markA { width: 56px; height: 56px; border-radius: 12px; background: var(--accent); display: grid; place-items: center; color: #fff; font-family: var(--font-serif); font-size: 32px; font-weight: 600; letter-spacing: -0.02em; box-shadow: var(--shadow-md); }
  .lockup { display: flex; flex-direction: column; gap: 4px; }
  .name { font-family: var(--font-serif); font-size: 24px; font-weight: 600; letter-spacing: -0.01em; color: var(--text-primary); line-height: 1; }
  .tag  { font-size: 12px; color: var(--text-muted); }
  .scale { display: flex; align-items: end; gap: 16px; padding-left: 32px; border-left: 1px solid var(--border-soft); }
  .scale .markA { box-shadow: var(--shadow-sm); border-radius: 8px; }
  .s-32 { width: 32px; height: 32px; font-size: 18px; }
  .s-24 { width: 24px; height: 24px; font-size: 14px; border-radius: 6px; }
  .s-16 { width: 16px; height: 16px; font-size: 10px; border-radius: 4px; }
</style></head>
<body>
  <div class="specimen">
    <div class="markA">A</div>
    <div class="lockup">
      <div class="name">Atelier</div>
      <div class="tag">Ahmad's Life OS</div>
    </div>
  </div>
  <div class="scale">
    <div class="markA s-16">A</div>
    <div class="markA s-24">A</div>
    <div class="markA s-32">A</div>
    <div class="markA">A</div>
  </div>
</body></html>
