<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-primary); display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .pair { display: flex; gap: 6px; align-items: stretch; }
  .core { flex: 0 0 56px; height: 56px; border-radius: 8px; box-shadow: var(--shadow-sm); }
  .soft { flex: 1; height: 56px; border-radius: 8px; }
  .meta { font-size: 11px; color: var(--text-secondary); display: flex; justify-content: space-between; font-family: var(--font-mono); }
  .name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
</style></head>
<body>
  <div class="row">
    <div class="name">Success</div>
    <div class="pair"><div class="core" style="background:#2F7D5A"></div><div class="soft" style="background:#E4F1EB"></div></div>
    <div class="meta"><span>#2F7D5A</span><span>#E4F1EB</span></div>
  </div>
  <div class="row">
    <div class="name">Warning</div>
    <div class="pair"><div class="core" style="background:#B07B1F"></div><div class="soft" style="background:#F8EFD9"></div></div>
    <div class="meta"><span>#B07B1F</span><span>#F8EFD9</span></div>
  </div>
  <div class="row">
    <div class="name">Danger</div>
    <div class="pair"><div class="core" style="background:#B43B3B"></div><div class="soft" style="background:#F8E2E2"></div></div>
    <div class="meta"><span>#B43B3B</span><span>#F8E2E2</span></div>
  </div>
  <div class="row">
    <div class="name">Info</div>
    <div class="pair"><div class="core" style="background:#3B6EB4"></div><div class="soft" style="background:#E4ECF7"></div></div>
    <div class="meta"><span>#3B6EB4</span><span>#E4ECF7</span></div>
  </div>
</body></html>
