<!doctype html>
<html><head><meta charset="utf-8"><title>Icon set</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: var(--bg-primary); display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 6px; border-radius: var(--radius-sm); background: var(--bg-raised); border: 1px solid var(--border-soft); }
  .item svg { width: 20px; height: 20px; stroke: var(--text-primary); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--text-muted); }
</style></head>
<body>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5Z"/></svg><div class="lbl">home</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M7 10h4M7 14h7"/></svg><div class="lbl">tasks</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M3 7h15a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/><path d="M3 7V5a2 2 0 0 1 2-2h11"/><circle cx="17" cy="13" r="1.2"/></svg><div class="lbl">wallet</div></div>

  <div class="item"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17" cy="9" r="2.5"/><path d="M15 15.5c3 0 6 1.8 6 4.5"/></svg><div class="lbl">users</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><div class="lbl">check</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><div class="lbl">plus</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg><div class="lbl">x</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><div class="lbl">search</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><div class="lbl">calendar</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M3 5h18l-7 9v6l-4-2v-4L3 5Z"/></svg><div class="lbl">filter</div></div>
  <div class="item"><svg viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></svg><div class="lbl">trendUp</div></div>
