<!doctype html>
<html><head><meta charset="utf-8"><title>Pills & status</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-primary); display: flex; flex-direction: column; gap: 16px; align-items: flex-start; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--radius-sm);
    font-family: var(--font-mono); font-size: 11px; font-weight: 500;
    border: 1px solid transparent;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .p-p0 { color: var(--danger); background: var(--danger-soft); }
  .p-p1 { color: var(--warning); background: var(--warning-soft); }
  .p-p2 { color: var(--info); background: var(--info-soft); }
  .p-p3 { color: var(--text-secondary); background: var(--bg-tertiary); }
  .p-done { color: var(--success); background: var(--success-soft); }
  .p-doing { color: var(--warning); background: var(--warning-soft); }
  .p-todo { color: var(--text-secondary); background: var(--bg-tertiary); }
  .p-blocked { color: var(--danger); background: var(--danger-soft); }
  .dot { width: 6px; height: 6px; border-radius: 50%; flex: 0 0 6px; }
  .status { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
</style></head>
<body>
  <div class="row">
    <span class="pill p-p0">P0</span>
    <span class="pill p-p1">P1</span>
    <span class="pill p-p2">P2</span>
    <span class="pill p-p3">P3</span>
    <span class="pill p-done">Done</span>
    <span class="pill p-doing">Doing</span>
    <span class="pill p-todo">Todo</span>
    <span class="pill p-blocked">Blocked</span>
  </div>
  <div class="row">
    <span class="status" style="color:var(--success)"><span class="dot" style="background:var(--success)"></span>On track</span>
    <span class="status" style="color:var(--warning)"><span class="dot" style="background:var(--warning)"></span>Approaching limit</span>
    <span class="status" style="color:var(--danger)"><span class="dot" style="background:var(--danger)"></span>Overdue</span>
    <span class="status" style="color:var(--accent)"><span class="dot" style="background:var(--accent)"></span>Active</span>
    <span class="status" style="color:var(--text-muted)"><span class="dot" style="background:var(--text-muted)"></span>Idle</span>
  </div>
</body></html>
