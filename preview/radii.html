<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-primary); display: flex; gap: 22px; align-items: end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 80px; height: 80px; background: var(--bg-raised); border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
  .lbl { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); text-align: center; }
  .name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">sm</div><div class="lbl">6 px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="name">md</div><div class="lbl">8 px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="name">lg</div><div class="lbl">12 px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">xl</div><div class="lbl">16 px</div></div>
  <div class="item"><div class="box" style="border-radius:50%"></div><div class="name">round</div><div class="lbl">50%</div></div>
</body></html>
