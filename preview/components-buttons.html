<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg-primary); display: flex; flex-direction: column; gap: 14px; align-items: flex-start; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-sans); font-weight: 500; letter-spacing: .01em;
    border-radius: var(--radius-md); border: 1px solid transparent;
    padding: 10px 20px; font-size: 14px; cursor: pointer;
    transition: all .15s var(--ease);
  }
  .btn-sm { padding: 7px 14px; font-size: 13px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: transparent; color: var(--accent); border-color: var(--border); }
  .btn-secondary:hover { background: var(--accent-soft); }
  .btn-ghost { background: transparent; color: var(--text-secondary); }
  .btn-ghost:hover { background: var(--bg-tertiary); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--border); }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body>
  <div class="row">
    <button class="btn btn-primary"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Log expense</button>
    <button class="btn btn-secondary">View statement</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>Delete</button>
  </div>
  <div class="row">
    <button class="btn btn-primary btn-sm">New entry</button>
    <button class="btn btn-secondary btn-sm">Filter</button>
    <button class="btn btn-ghost btn-sm">Skip</button>
  </div>
</body></html>
