<!doctype html>
<html><head><meta charset="utf-8"><title>Multi-select bulk-action bar (new)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg-primary); display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--bg-secondary); border: 1px solid var(--border-soft); border-radius: var(--radius-md); font-size: 13px; }
  .row.selected { background: var(--accent-soft); border-color: var(--accent); }
  .check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border); flex: 0 0 16px; display: grid; place-items: center; }
  .check.on { background: var(--accent); border-color: var(--accent); }
  .check svg { width: 10px; height: 10px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .desc { flex: 1; color: var(--text-primary); }
  .meta { color: var(--text-muted); font-size: 12px; font-family: var(--font-mono); }
  .amt { font-family: var(--font-mono); color: var(--danger); font-size: 14px; }
  .bar { display: flex; align-items: center; gap: 12px; padding: 12px 18px; background: var(--accent); color: #fff; border-radius: var(--radius-md); box-shadow: var(--shadow-md); }
  .bar .count { font-weight: 500; }
  .bar .spacer { flex: 1; }
  .bar button { background: rgba(255,255,255,0.16); color: #fff; border: 0; padding: 7px 14px; border-radius: 6px; font: inherit; cursor: pointer; font-size: 13px; }
  .bar button.danger { background: #fff; color: var(--danger); font-weight: 500; }
</style></head>
<body>
  <div class="row selected"><div class="check on"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="desc">Carrefour — groceries</div><div class="meta">2025-04-21</div><div class="amt">−€62.40</div></div>
  <div class="row selected"><div class="check on"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="desc">Pharmacy — prescription</div><div class="meta">2025-04-15</div><div class="amt">−€38.00</div></div>
  <div class="row"><div class="check"></div><div class="desc">Train to Lyon</div><div class="meta">2025-04-09</div><div class="amt">−€89.00</div></div>
  <div class="bar"><span class="count">2 selected</span><span class="spacer"></span><button>Cancel</button><button class="danger">Delete selected</button></div>
</body></html>
