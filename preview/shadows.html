<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 36px; background: var(--bg-primary); display: flex; gap: 32px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 110px; height: 80px; background: var(--bg-raised); border: 1px solid var(--border-soft); border-radius: 12px; }
  .name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="name">shadow-sm</div><div class="lbl">cards · rest</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="name">shadow-md</div><div class="lbl">cards · hover</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="name">shadow-lg</div><div class="lbl">modals</div></div>
</body></html>
