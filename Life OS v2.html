<style id="atelier-base">
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    transition: background-color 0.3s ease, color 0.2s ease;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); color: var(--text-primary); }

  /* Scrollbar — discreet */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); background-clip: content-box; border: 2px solid transparent; }

  .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  .serif { font-family: 'Playfair Display', Georgia, serif; }
  .caps { text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 500; color: var(--text-muted); }

  /* Light/Dark mode transition for all tokens */
  html.theme-transition * { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.2s ease !important; }

  /* Hide mobile companion at narrower viewports so main content has room */
  @media (max-width: 1500px) {
    .atelier-mobile-aside { display: none !important; }
  }
</style>
