<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Life OS" />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 14px;
  background: var(--bg-primary, #0d1117);
  color: var(--text-primary, #e6edf3);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; color: inherit; }
::selection { background: var(--accent-soft); color: var(--text-primary); }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; }
.serif { font-family: 'Playfair Display', Georgia, serif; }
.caps { text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 500; color: var(--text-muted); }
.fade-in { animation: fadeIn 250ms ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── Standalone theme tokens ── */
:root {
  --bg-primary:    #0d1117;
  --bg-secondary:  #161b22;
  --bg-tertiary:   #1c2128;
  --bg-raised:     #21262d;
  --border:        rgba(240,246,252,0.1);
  --border-soft:   rgba(240,246,252,0.06);
  --text-primary:  #e6edf3;
  --text-secondary:#8b949e;
  --text-muted:    #484f58;
  --accent:        #58a6ff;
  --accent-hover:  #79b8ff;
  --accent-soft:   rgba(88,166,255,0.1);
  --success:       #3fb950;
  --success-soft:  rgba(63,185,80,0.1);
  --warning:       #d29922;
  --warning-soft:  rgba(210,153,34,0.1);
  --danger:        #f85149;
  --danger-soft:   rgba(248,81,73,0.1);
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:     0 4px 16px rgba(0,0,0,0.5);
  --shadow-lg:     0 16px 40px rgba(0,0,0,0.6);
  --ease:          cubic-bezier(0.25,0.1,0.25,1);
  --font-mono:     'IBM Plex Mono', ui-monospace, monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 16px;
  --space-lg: 24px; --space-xl: 32px;
  --radius-sm: 6px; --radius-md: 8px; --radius-lg: 12px;
}

/* ── Responsive ── */
.bottom-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 60px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-soft);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  z-index: 100;
}
@media (max-width: 768px) {
  .sidebar { display: none !important; }
  .main-content { padding: 20px 16px 80px !important; }
  .bottom-nav { display: flex; align-items: center; justify-content: space-around; }
  .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
  .two-col { grid-template-columns: 1fr !important; }
  .page-title { flex-direction: column; align-items: flex-start; }
  .page-title-right { margin-top: 10px; }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
